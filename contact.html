<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ – GOGOカウンター</title>
  <link rel="canonical" href="https://gogo-counter.kuwastudio.com/contact.html">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #08070a;
      --card:   #0e0e14;
      --border: #1e1e28;
      --gold:   #FFD60A;
      --text:   #ffffff;
      --sub:    #9aa0a8;
      --muted:  #4a4d55;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      line-height: 1.7;
    }

    a { color: var(--gold); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── ヘッダー ── */
    header {
      background: radial-gradient(ellipse at 50% 0%, #1a1614 0%, #08070a 80%);
      padding: 40px 20px 30px;
      border-bottom: 1px solid var(--border);
      text-align: center;
    }

    header .back {
      display: inline-block;
      color: var(--sub);
      font-size: 13px;
      margin-bottom: 16px;
    }

    header h1 {
      font-size: 22px;
      font-weight: 900;
    }

    header p {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
    }

    /* ── コンテンツ ── */
    main {
      max-width: 680px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }

    .section {
      margin-bottom: 32px;
    }

    .section h2 {
      font-size: 13px;
      font-weight: 800;
      color: var(--gold);
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .section p {
      font-size: 14px;
      color: var(--sub);
      line-height: 1.8;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 32px 0;
    }

    /* ── フォーム ── */
    label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
    }

    label .required {
      color: #ff6b6b;
      font-size: 11px;
      font-weight: 800;
      margin-left: 4px;
    }

    label .optional {
      color: var(--muted);
      font-size: 11px;
      font-weight: 500;
      margin-left: 4px;
    }

    .field {
      margin-bottom: 20px;
    }

    input[type="text"],
    input[type="email"],
    textarea {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 14px;
      color: var(--text);
      font-family: inherit;
      outline: none;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    textarea:focus {
      border-color: var(--gold);
    }

    textarea {
      resize: vertical;
      min-height: 140px;
      line-height: 1.6;
    }

    .note {
      font-size: 12px;
      color: var(--muted);
      margin: 12px 0 24px;
      line-height: 1.7;
    }

    .submit-btn {
      display: block;
      width: 100%;
      background: var(--gold);
      color: #08070a;
      font-size: 15px;
      font-weight: 800;
      border: none;
      border-radius: 12px;
      padding: 14px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .submit-btn:hover {
      opacity: 0.85;
    }

    /* ── フッター ── */
    footer {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      padding: 32px 20px;
      border-top: 1px solid var(--border);
    }

    footer a { color: var(--sub); }
  </style>
</head>
<body>

  <header>
    <a class="back" href="index.html">← GOGOカウンター トップへ</a>
    <h1>お問い合わせ</h1>
    <p>ご意見・不具合報告はこちらから</p>
  </header>

  <main>
    <div class="section">
      <div class="field">
        <label for="c-name">お名前<span class="optional">（任意）</span></label>
        <input type="text" id="c-name" name="name" placeholder="山田 太郎">
      </div>

      <div class="field">
        <label for="c-email">メールアドレス<span class="required">必須</span></label>
        <input type="email" id="c-email" name="email" placeholder="example@mail.com" required>
      </div>

      <div class="field">
        <label for="c-message">お問い合わせ内容<span class="required">必須</span></label>
        <textarea id="c-message" name="message" placeholder="不具合の内容、ご意見・ご要望などをご記入ください" required></textarea>
      </div>

      <p class="note">送信ボタンを押すと、お使いのメールアプリが起動します（本文が自動入力されます）。外部サービスへの送信・データの保存は行われません。</p>

      <button type="button" class="submit-btn" onclick="sendContact()">送信する</button>
    </div>
  </main>

  <footer>
    <a href="index.html">GOGOカウンター トップへ戻る</a>
  </footer>

  <script>
    function sendContact() {
      const name = document.getElementById('c-name').value.trim();
      const email = document.getElementById('c-email').value.trim();
      const message = document.getElementById('c-message').value.trim();
      if (!email || !message) {
        alert('メールアドレスとお問い合わせ内容を入力してください。');
        return;
      }
      const subject = 'GOGOカウンター お問い合わせ';
      const body = `お名前：${name || '(未記入)'}\nメールアドレス：${email}\n\n${message}`;
      location.href = `mailto:support@kuwastudio.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    }
  </script>

</body>
</html>
